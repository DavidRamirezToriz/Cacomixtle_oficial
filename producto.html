<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto | CACOMIXTLE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar sticky-top">
        <div class="container justify-content-center">
            <a class="navbar-brand" href="index.html">
                <img src="img/caco_log.png" class="brand-logo" alt="Cacomixtle Logo"> CACOMIXTLE
            </a>
        </div>
    </nav>

    <div class="container py-5 mt-4">
        <div id="detalle-producto" class="row g-5 align-items-center"></div>
    </div>

    <footer class="footer">
        <div class="container">
            <a href="index.html" class="footer-logo">Cacomixtle</a>
            <div class="footer-socials">
                <a href="https://www.instagram.com/cacomixtle_puebla?igsh=YmNxemw4ZGd0ejN5"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/522225968886"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p class="small opacity-25">© 2026 CACOMIXTLE</p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/main.js"></script>
    <script>
        AOS.init();
        const id = new URLSearchParams(window.location.search).get('id');
        fetch('js/datos.json').then(res => res.json()).then(data => {
            const p = data.productos.find(i => i.id === id);
            if(p) {
                document.getElementById('detalle-producto').innerHTML = `
                    <div class="col-md-7" data-aos="fade-right">
                        <img src="${p.imagenPrincipal}" class="img-fluid w-100 shadow-lg">
                    </div>
                    <div class="col-md-5" data-aos="fade-left">
                        <h1 class="hero-content h1" style="font-family: var(--font-fancy); font-size: 3.5rem; text-align: left;">${p.nombre}</h1>
                        <div class="talavera-divider" style="width: 80px; margin: 20px 0;"></div>
                        <div class="mb-4">
                            <span class="price-old h4">$${p.precioOriginal}</span>
                            <span class="price-new h2">$${p.precioOferta} MXN</span>
                        </div>
                        <p class="lead fw-light text-muted mb-5">${p.descripcion}</p>
                        <select id="talla" class="form-select border-0 bg-light p-4 mb-4 fw-bold">
                            <option>S</option><option selected>M</option><option>G</option><option>XL</option>
                        </select>
                        <button onclick="enviarPedido('${p.nombre}')" class="btn-premium">ADQUIRIR VÍA WHATSAPP</button>
                    </div>`;
            }
        });
    </script>
</body>
</html>
